<mat-toolbar>
  <span>Mért adatok</span>
</mat-toolbar>

<div class="filter-panel">
  <form [formGroup]="filterForm" class="filter-form">

    <mat-form-field appearance="outline">
      <mat-label>Periódus</mat-label>
      <mat-select formControlName="period">
        <mat-option *ngFor="let opt of periodOptions" [value]="opt.value">{{ opt.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Mérési paraméter azonosító</mat-label>
      <input matInput formControlName="measuringPointId" type="number" min="1">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Kezdő dátum</mat-label>
      <input matInput [matDatepicker]="startPicker" formControlName="startDate" readonly>
      <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
      <mat-datepicker #startPicker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Záró dátum</mat-label>
      <input matInput [matDatepicker]="endPicker" formControlName="endDate" readonly>
      <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
      <mat-datepicker #endPicker></mat-datepicker>
    </mat-form-field>

  </form>
</div>

<axing-table-wrapper
    [restApiurl]="url"
    [columns]="columns"
    >
</axing-table-wrapper>
